{% extends "base.html" %}

{% block title %}Edit Material{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2><i class="bi bi-pencil"></i> Edit Material</h2>
        </div>
        <div class="col-md-4 text-end">
            <a href="{{ url_for('stock.inventory') }}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Material Code</label>
                                <input type="text" class="form-control" value="{{ material.code }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <input type="text" class="form-control" name="category" value="{{ material.category }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Material Name</label>
                            <input type="text" class="form-control" name="name" value="{{ material.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3">{{ material.description or '' }}</textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Unit</label>
                                <input type="text" class="form-control" name="unit" value="{{ material.unit }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Unit Cost ($)</label>
                                <input type="number" class="form-control" name="unit_cost" step="0.01" value="{{ material.unit_cost }}" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Minimum Stock</label>
                                <input type="number" class="form-control" name="min_stock" value="{{ material.min_stock }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Maximum Stock</label>
                                <input type="number" class="form-control" name="max_stock" value="{{ material.max_stock }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Supplier</label>
                            <input type="text" class="form-control" name="supplier" value="{{ material.supplier or '' }}">
                        </div>

                        <div class="alert alert-info">
                            <strong><i class="bi bi-info-circle"></i> Current Stock:</strong> {{ material.current_stock }} {{ material.unit }}
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Save Changes
                            </button>
                            <a href="{{ url_for('stock.inventory') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
