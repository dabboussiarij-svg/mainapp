{% extends "base.html" %}

{% block title %}Edit Maintenance Plan{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            <h1>Edit Plan</h1>
            <form method="POST">
                <div class="form-group">
                    <label>Plan Name</label>
                    <input type="text" name="plan_name" class="form-control" value="{{ plan.plan_name }}" required>
                </div>
                <div class="form-group">
                    <label>Frequency</label>
                    <select name="frequency_type" class="form-control" required>
                        <option value="monthly" {% if plan.frequency_type == 'monthly' %}selected{% endif %}>Monthly</option>
                        <option value="semi-annual" {% if plan.frequency_type == 'semi-annual' %}selected{% endif %}>Semi-Annual</option>
                        <option value="annual" {% if plan.frequency_type == 'annual' %}selected{% endif %}>Annual</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="4">{{ plan.description or '' }}</textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="is_active" {% if plan.is_active %}checked{% endif %}>
                        Active
                    </label>
                </div>
                <button type="submit" class="btn btn-success">Save Changes</button>
                <a href="{{ url_for('preventive.plan_detail', plan_id=plan.id) }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
