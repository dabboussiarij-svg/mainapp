{% extends "base.html" %}

{% block title %}Add Maintenance Task{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1>Add Maintenance Task</h1>
            <p class="text-muted">{{ plan.plan_name }}</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('preventive.create_task', plan_id=plan.id) }}">
                        <div class="form-group">
                            <label for="task_description"><strong>Task Description <span class="text-danger">*</span></strong></label>
                            <textarea name="task_description" id="task_description" class="form-control" rows="3" required
                                      placeholder="Describe the maintenance task..."></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="category"><strong>Category</strong></label>
                                <input type="text" name="category" id="category" class="form-control" 
                                       placeholder="e.g., Electrical, Mechanical, Hydraulic">
                            </div>
                            <div class="form-group col-md-6">
                                <label for="estimated_duration_minutes"><strong>Est. Duration (minutes)</strong></label>
                                <input type="number" name="estimated_duration_minutes" id="estimated_duration_minutes" class="form-control" 
                                       value="15" min="1">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="required_materials"><strong>Required Materials</strong></label>
                            <textarea name="required_materials" id="required_materials" class="form-control" rows="2"
                                      placeholder="List materials, parts, or tools needed (comma-separated)"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="safety_precautions"><strong>Safety Precautions</strong></label>
                            <textarea name="safety_precautions" id="safety_precautions" class="form-control" rows="2"
                                      placeholder="Important safety warnings or precautions"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="notes"><strong>Additional Notes</strong></label>
                            <textarea name="notes" id="notes" class="form-control" rows="2"
                                      placeholder="Any other information..."></textarea>
                        </div>

                        <div class="form-group">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-save"></i> Add Task
                            </button>
                            <a href="{{ url_for('preventive.plan_detail', plan_id=plan.id) }}" class="btn btn-secondary btn-lg">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
